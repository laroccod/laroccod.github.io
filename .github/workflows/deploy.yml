name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Pin Flutter to the 3.44 line matching the local toolchain flet 0.86
      # was verified against; a floating channel could drift ahead of flet.
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.x"
          channel: stable
          cache: true

      - run: pip install "flet[all]==0.86.0"

      - run: flet build web --route-url-strategy hash --verbose

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
